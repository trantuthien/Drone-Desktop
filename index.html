        function spawnBubble(x, y) {
            const count = 1 + Math.floor(Math.random() * 3); // 1-3 small bubbles
            for (let i = 0; i < count; i++) {
                bubbles.push({
                    x: x + (Math.random() - 0.5) * 4,
                    y: y + (Math.random() - 0.5) * 3,
                    r: 1 + Math.random() * 1.5,          // small: 1-2.5px
                    vx: (Math.random() - 0.5) * 3,       // very slight drift

            const count = 4 + Math.floor(Math.random() * 3);
            for (let i = 0; i < count; i++) {
                const angle = (i / count) * Math.PI * 2 + Math.random() * 0.5;
                const speed = 15 + Math.random() * 25;
                popParticles.push({
                    x: b.x,
                    y: b.y,
                    vx: Math.cos(angle) * speed,
                    vy: Math.sin(angle) * speed,
                    r: 0.4 + Math.random() * 0.5,
                    life: 0,
                    maxLife: 0.15 + Math.random() * 0.1, // very short: 0.15-0.25s

            reset() {

                this.y = Math.random() * (window.innerHeight - 100);
                const speed = config.moveSpeed.min + Math.random() * (config.moveSpeed.max - config.moveSpeed.min);
                const vr = currentTheme.verticalRatio;
                if (vr != null) {
                    // Mostly horizontal: full speed left or right, small vertical drift
                    this.vx = (Math.random() < 0.5 ? -1 : 1) * speed;
                    this.vy = (Math.random() - 0.5) * 2 * speed * vr;
                } else {
                    const angle = Math.random() * Math.PI * 2;
                    this.vx = Math.cos(angle) * speed;
                    this.vy = Math.sin(angle) * speed;

            }

            get centerX() { return this.x + (FRAME_W * this.scale) / 2; }
            get centerY() { return this.y + (FRAME_H * this.scale) / 2; }

            checkCollision(other) {
                if (this.collisionCooldown > 0 || other.collisionCooldown > 0) return false;
                const dx = this.centerX - other.centerX;
                const dy = this.centerY - other.centerY;
                const dist = Math.sqrt(dx * dx + dy * dy);
                return dist < COLLISION_RADIUS * (this.scale + other.scale);

                this.collisionCooldown = 0.5;

                if (this.hits >= MAX_HITS) {
                    this.dead = true;
                } else {

                this.vx *= -1.2;
                this.vy *= -1.2;
            }

                this.collisionCooldown = Math.max(0, this.collisionCooldown - dt);

                this.x += this.vx * dt;
                this.y += this.vy * dt;

                const speed = Math.sqrt(this.vx * this.vx + this.vy * this.vy);
                const maxAllowedSpeed = Math.max(100, config.moveSpeed.max * 1.5);
                if (speed > maxAllowedSpeed) {
                    this.vx *= 0.98;
                    this.vy *= 0.98;
                }

                if (this.x < 0 || this.x > canvas.width - FRAME_W * this.scale) {
                    this.vx *= -1;
                    this.x = Math.max(0, Math.min(this.x, canvas.width - FRAME_W * this.scale));
                }
                if (this.y < 0 || this.y > canvas.height - FRAME_H * this.scale) {
                    this.vy *= -1;
                    this.y = Math.max(0, Math.min(this.y, canvas.height - FRAME_H * this.scale));
                }

                // Clamp vertical speed for themes with verticalRatio
                const vr = currentTheme.verticalRatio;
                if (vr != null) {
                    const maxVy = Math.abs(this.vx) * vr;
                    this.vy = Math.max(-maxVy, Math.min(this.vy, maxVy));
                }

                this.frameTime += dt;
                if (this.frameTime >= config.spriteSpeed) {
                    this.frame = (this.frame + 1) % ANIM_FRAMES;
                    this.frameTime = 0;
                }

                // Bubble spawning (only for themes with bubbles)
                if (currentTheme.bubbles) {
                    this.bubbleTimer -= dt;
                    if (this.bubbleTimer <= 0) {
                        const mouthX = this.centerX + this.vx * 0.3;
                        const mouthY = this.centerY + this.vy * 0.3;
                        spawnBubble(mouthX, mouthY);
                        this.bubbleTimer = 3 + Math.random() * 5;
                    }
                }
            }

            draw(ctx, time) {
                if (this.dead || !spriteSheet) return;

                const hoverY = config.hoverAmplitude > 0
                    ? Math.sin(time / config.hoverPeriod + this.hoverOffset) * config.hoverAmplitude
                    : 0;

                const angle = Math.atan2(this.vy, this.vx);
                const normalizedAngle = (angle + Math.PI * 2) % (Math.PI * 2);
                const sector = Math.floor((normalizedAngle + Math.PI / 8) / (Math.PI / 4)) % 8;
                const dir = SECTOR_TO_DIR[sector];

                const fd = spriteFrames[FRAME_NAMES[dir][this.frame]];
                if (!fd) return;

                ctx.globalAlpha = this.alpha;
                const drawX = (this.x - fd.offsetX * this.scale) | 0;
                const drawY = (this.y + hoverY - fd.offsetY * this.scale) | 0;
                ctx.drawImage(
                    spriteSheet,
                    fd.x, fd.y, fd.w, fd.h,
                    drawX, drawY,
                    fd.w * this.scale, fd.h * this.scale

            }

        function checkAllCollisions() {
            if (!config.collisionEnabled) return;
            for (let i = 0; i < drones.length; i++) {
                for (let j = i + 1; j < drones.length; j++) {
                    if (drones[i].dead || drones[j].dead) continue;
                    if (drones[i].checkCollision(drones[j])) {
                        drones[i].onCollision();
                        drones[j].onCollision();
                    }
                }
            }
        }

            // In-place removal để tránh GC
            for (let i = drones.length - 1; i >= 0; i--) {
                if (drones[i].dead) {
                    drones.splice(i, 1);
                }
            }

            if (drones.length === 0 && targetDroneCount > 0) {
                for (let i = 0; i < targetDroneCount; i++) {
                    drones.push(new Drone());
                }
                syncCount();
            }

        function removeDrones(n) {
            const toRemove = Math.min(n, drones.length - 1);
            for (let i = 0; i < toRemove; i++) {
                drones.pop();
            }
            targetDroneCount = Math.max(1, drones.length);
            syncCount();
        }

            targetDroneCount = n;

        // Drag functionality

        function findDroneAt(x, y) {
            for (let i = drones.length - 1; i >= 0; i--) {
                const d = drones[i];
                if (d.dead) continue;
                const cx = d.x + (FRAME_W * d.scale) / 2;
                const cy = d.y + (FRAME_H * d.scale) / 2;
                const dist = Math.sqrt((x - cx) ** 2 + (y - cy) ** 2);
                if (dist < COLLISION_RADIUS * d.scale) {
                    return d;
                }
            }
            return null;
        }

        canvas.addEventListener('mousedown', (e) => {
            if (!config.dragEnabled) return;
            const drone = findDroneAt(e.clientX, e.clientY);
            if (drone) {
                draggedDrone = drone;
                dragOffset.x = e.clientX - drone.x;
                dragOffset.y = e.clientY - drone.y;
                drone.vx = 0;
                drone.vy = 0;
                canvas.style.cursor = 'grabbing';
            }
        });

        canvas.addEventListener('mousemove', (e) => {
            if (!config.dragEnabled) return;
            if (draggedDrone) {
                draggedDrone.x = e.clientX - dragOffset.x;
                draggedDrone.y = e.clientY - dragOffset.y;
            } else {
                const drone = findDroneAt(e.clientX, e.clientY);
                canvas.style.cursor = drone ? 'grab' : 'default';
            }
        });

            if (draggedDrone) {
                canvas.style.cursor = config.dragEnabled ? 'grab' : 'default';
                draggedDrone = null;

            if (draggedDrone) {

            animTime += FRAME_MS;

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            const len = drones.length;
            for (let i = 0; i < len; i++) {
                drones[i].update(FIXED_DT);
            }

            updateBubbles(FIXED_DT);
            checkAllCollisions();
            if (frameCount % 60 === 0) cleanupDrones();

            for (let i = 0; i < len; i++) {
                drones[i].draw(ctx, animTime);
            }
            drawBubbles(ctx);
        }

        document.addEventListener('visibilitychange', () => {
            isVisible = !document.hidden;
        });

        function init() {
            resize();
            window.addEventListener('resize', resize);
            buildFrameNames();
            loadSpriteData();

            const img = new Image();
            img.src = currentTheme.file;
            img.onload = () => {
                spriteSheet = img;
                for (let i = 0; i < targetDroneCount; i++) {
                    drones.push(new Drone());
                }
                syncCount();
                setInterval(loop, FRAME_MS);
            };
        }

        init();
    </script>
</body>
</html>
