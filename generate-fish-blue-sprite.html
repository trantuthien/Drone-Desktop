<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blue Fish Sprite Generator</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #1a1a2e;
    color: #e0e0e0;
    font-family: 'Courier New', monospace;
    padding: 20px;
  }
  h1 { color: #3588FF; margin-bottom: 10px; }
  .subtitle { color: #888; margin-bottom: 20px; font-size: 14px; }
  .buttons { display: flex; gap: 10px; margin-bottom: 15px; flex-wrap: wrap; }
  button {
    background: #FF6B35;
    color: #fff;
    border: none;
    padding: 10px 20px;
    font-size: 14px;
    font-family: inherit;
    cursor: pointer;
    border-radius: 4px;
  }
  button:hover { background: #e05a28; }
  button:disabled { background: #555; cursor: not-allowed; }
  #status { color: #aaa; margin-bottom: 15px; font-size: 13px; min-height: 20px; }
  .section-title { color: #FF8C5A; margin: 15px 0 8px; font-size: 15px; }
  #preview-area {
    display: flex; flex-wrap: wrap; gap: 12px;
    margin-bottom: 20px; min-height: 50px;
  }
  .dir-preview {
    background: #0f0f23;
    border: 1px solid #333;
    border-radius: 4px;
    padding: 6px;
    text-align: center;
  }
  .dir-preview .label { font-size: 11px; color: #888; margin-top: 4px; }
  #atlas-container {
    margin-bottom: 20px;
    overflow: auto;
    max-height: 400px;
    background: #0f0f23;
    border: 1px solid #333;
    border-radius: 4px;
    padding: 8px;
  }
  #atlas-canvas { image-rendering: pixelated; }
  #sprite-data-output {
    background: #0f0f23;
    border: 1px solid #333;
    border-radius: 4px;
    padding: 12px;
    font-size: 11px;
    max-height: 300px;
    overflow: auto;
    white-space: pre-wrap;
    word-break: break-all;
  }
</style>
</head>
<body>
<h1>Blue Fish Sprite Generator</h1>
<p class="subtitle">Generates a blue elongated fish sprite sheet (8 directions x 12 frames)</p>

<div class="buttons">
  <button id="btn-generate" onclick="generate()">Generate</button>
  <button id="btn-download" onclick="downloadPNG()" disabled>Download PNG</button>
  <button id="btn-copy" onclick="copySpriteData()" disabled>Copy SPRITE_DATA</button>
</div>

<div id="status">Click Generate to create the sprite sheet.</div>

<div class="section-title">Direction Previews</div>
<div id="preview-area"></div>

<div class="section-title">Texture Atlas</div>
<div id="atlas-container">
  <canvas id="atlas-canvas"></canvas>
</div>

<div class="section-title">SPRITE_DATA</div>
<div id="sprite-data-output"></div>

<script>
// === Configuration ===
const FRAME_W = 60;
const FRAME_H = 48;
const LOGICAL_W = 96;
const LOGICAL_H = 96;
const ANIM_FRAMES = 12;
const DIRECTIONS = 8;
const ATLAS_W = 254;
const PADDING = 1;

// Storage
let allFrames = {}; // key: "fish_blue_D-FF" -> canvas
let spriteDataJSON = '';
let atlasCanvas = null;
const DIR_NAMES = ['Up', 'Up-Right', 'Right', 'Down-Right', 'Down', 'Down-Left', 'Left', 'Up-Left'];

// === Draw one frame of blue elongated fish facing right ===
function drawBlueFishRight(ctx, tailAngle, finOffset) {
  const cx = 26;  // body center X (shifted left — longer body needs room for tail)
  const cy = 24;  // body center Y
  const bodyRx = 18; // elongated horizontal radius
  const bodyRy = 7;  // slimmer vertical radius

  ctx.save();
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';

  // --- Tail fin (behind body, elegant forked) ---
  const tailBaseX = cx - bodyRx + 2;
  const tailSwing = Math.sin(tailAngle) * 5;
  const tailTipX = tailBaseX - 10;
  const tailTipY = cy + tailSwing;

  var tailGrad = ctx.createLinearGradient(tailBaseX, cy, tailTipX, tailTipY);
  tailGrad.addColorStop(0, '#4090DD');
  tailGrad.addColorStop(1, '#2060AA');
  ctx.fillStyle = tailGrad;
  ctx.beginPath();
  ctx.moveTo(tailBaseX, cy - 1.5);
  ctx.quadraticCurveTo(tailBaseX - 5, cy - 1 + tailSwing * 0.4, tailTipX, tailTipY - 6);
  ctx.quadraticCurveTo(tailBaseX - 4, tailTipY, tailTipX + 1, tailTipY);
  ctx.quadraticCurveTo(tailBaseX - 4, tailTipY, tailTipX, tailTipY + 6);
  ctx.quadraticCurveTo(tailBaseX - 5, cy + 1 + tailSwing * 0.4, tailBaseX, cy + 1.5);
  ctx.closePath();
  ctx.fill();
  ctx.strokeStyle = '#1A4580';
  ctx.lineWidth = 0.5;
  ctx.stroke();

  // Tail fin rays
  ctx.strokeStyle = 'rgba(30, 70, 130, 0.3)';
  ctx.lineWidth = 0.3;
  for (let i = -2; i <= 2; i++) {
    ctx.beginPath();
    ctx.moveTo(tailBaseX - 1, cy + i * 0.8);
    ctx.lineTo(tailTipX + 2, tailTipY + i * 2.2);
    ctx.stroke();
  }

  // --- Body: elongated ellipse with blue gradient ---
  var bodyGrad = ctx.createRadialGradient(cx + 4, cy - 2, 2, cx, cy, bodyRx);
  bodyGrad.addColorStop(0, '#70B8FF');
  bodyGrad.addColorStop(0.4, '#3588DD');
  bodyGrad.addColorStop(1, '#1A5599');
  ctx.fillStyle = bodyGrad;
  ctx.beginPath();
  ctx.ellipse(cx, cy, bodyRx, bodyRy, 0, 0, Math.PI * 2);
  ctx.fill();

  // Body outline
  ctx.strokeStyle = '#13407A';
  ctx.lineWidth = 0.7;
  ctx.stroke();

  // --- Lateral line (horizontal stripe along body) ---
  ctx.strokeStyle = 'rgba(100, 180, 255, 0.5)';
  ctx.lineWidth = 0.6;
  ctx.beginPath();
  ctx.moveTo(cx - bodyRx + 4, cy);
  ctx.bezierCurveTo(cx - 6, cy - 0.5, cx + 6, cy - 0.5, cx + bodyRx - 3, cy);
  ctx.stroke();

  // --- Dorsal fin (long, elegant) ---
  const dorsalWave = finOffset * 0.5;
  ctx.fillStyle = '#4898EE';
  ctx.beginPath();
  ctx.moveTo(cx - 8, cy - bodyRy + 0.5);
  ctx.quadraticCurveTo(cx - 4, cy - bodyRy - 6 + dorsalWave, cx + 2, cy - bodyRy - 5 + dorsalWave);
  ctx.quadraticCurveTo(cx + 6, cy - bodyRy - 3 + dorsalWave, cx + 8, cy - bodyRy + 0.5);
  ctx.closePath();
  ctx.fill();
  ctx.strokeStyle = '#2265AA';
  ctx.lineWidth = 0.4;
  ctx.stroke();

  // Dorsal fin rays
  ctx.strokeStyle = 'rgba(25, 70, 140, 0.25)';
  ctx.lineWidth = 0.3;
  for (let i = 0; i < 6; i++) {
    const fx = cx - 6 + i * 2.5;
    ctx.beginPath();
    ctx.moveTo(fx, cy - bodyRy + 0.5);
    ctx.lineTo(fx + 0.3, cy - bodyRy - 4 + dorsalWave * (0.4 + i * 0.1));
    ctx.stroke();
  }

  // --- Anal fin (bottom, smaller) ---
  const analWave = -finOffset * 0.3;
  ctx.fillStyle = '#4898EE';
  ctx.beginPath();
  ctx.moveTo(cx - 4, cy + bodyRy - 0.5);
  ctx.quadraticCurveTo(cx - 1, cy + bodyRy + 4 + analWave, cx + 4, cy + bodyRy - 0.5);
  ctx.closePath();
  ctx.fill();
  ctx.strokeStyle = '#2265AA';
  ctx.lineWidth = 0.4;
  ctx.stroke();

  // --- Pectoral fin (side, animated) ---
  const pFinAngle = finOffset * 0.35;
  const pfx = cx + 6;
  const pfy = cy + 1;
  ctx.save();
  ctx.translate(pfx, pfy);
  ctx.rotate(pFinAngle * 0.12);
  ctx.fillStyle = 'rgba(80, 160, 240, 0.7)';
  ctx.beginPath();
  ctx.moveTo(0, 0);
  ctx.quadraticCurveTo(5, -1 + pFinAngle, 8, 2 + pFinAngle);
  ctx.quadraticCurveTo(4, 3 + pFinAngle * 0.4, 0, 1.5);
  ctx.closePath();
  ctx.fill();
  ctx.strokeStyle = '#2265AA';
  ctx.lineWidth = 0.3;
  ctx.stroke();
  ctx.restore();

  // --- Belly highlight (light underside) ---
  ctx.fillStyle = 'rgba(180, 220, 255, 0.3)';
  ctx.beginPath();
  ctx.ellipse(cx + 2, cy + 2, bodyRx - 6, bodyRy - 3, 0, 0, Math.PI * 2);
  ctx.fill();

  // --- Scales shimmer (subtle pattern) ---
  ctx.fillStyle = 'rgba(120, 200, 255, 0.15)';
  for (let sx = -10; sx <= 10; sx += 4) {
    for (let sy = -3; sy <= 3; sy += 3) {
      const px = cx + sx + (sy % 2) * 2;
      const py = cy + sy;
      const dist = (sx * sx) / (bodyRx * bodyRx) + (sy * sy) / (bodyRy * bodyRy);
      if (dist < 0.75) {
        ctx.beginPath();
        ctx.arc(px, py, 1.2, 0, Math.PI * 2);
        ctx.fill();
      }
    }
  }

  // --- Eye ---
  const eyeX = cx + 14;
  const eyeY = cy - 1;

  ctx.fillStyle = '#FFFFFF';
  ctx.beginPath();
  ctx.ellipse(eyeX, eyeY, 2, 2, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = '#0A2040';
  ctx.lineWidth = 0.4;
  ctx.stroke();

  // Pupil
  ctx.fillStyle = '#0A0A0A';
  ctx.beginPath();
  ctx.ellipse(eyeX + 0.6, eyeY + 0.2, 1.1, 1.2, 0, 0, Math.PI * 2);
  ctx.fill();

  // Eye highlight
  ctx.fillStyle = '#FFFFFF';
  ctx.beginPath();
  ctx.ellipse(eyeX + 0.1, eyeY - 0.6, 0.5, 0.4, -0.3, 0, Math.PI * 2);
  ctx.fill();

  // --- Mouth ---
  ctx.strokeStyle = '#0E3060';
  ctx.lineWidth = 0.5;
  ctx.beginPath();
  ctx.moveTo(cx + bodyRx - 1, cy + 0.5);
  ctx.quadraticCurveTo(cx + bodyRx + 0.3, cy + 1.5, cx + bodyRx - 1, cy + 2);
  ctx.stroke();

  ctx.restore();
}

// === Frame generation ===
function generateRightFrames() {
  const frames = [];
  for (let i = 0; i < ANIM_FRAMES; i++) {
    const t = (i / ANIM_FRAMES) * Math.PI * 2;
    const tailAngle = Math.sin(t) * 0.35;
    const finOffset = Math.sin(t + 0.5) * 1.5;

    const canvas = document.createElement('canvas');
    canvas.width = FRAME_W;
    canvas.height = FRAME_H;
    const ctx = canvas.getContext('2d');
    drawBlueFishRight(ctx, tailAngle, finOffset);
    frames.push(canvas);
  }
  return frames;
}

function rotateFrame(srcCanvas, angle) {
  const dst = document.createElement('canvas');
  dst.width = FRAME_W;
  dst.height = FRAME_H;
  const ctx = dst.getContext('2d');
  ctx.translate(FRAME_W / 2, FRAME_H / 2);
  ctx.rotate(angle);
  ctx.drawImage(srcCanvas, -FRAME_W / 2, -FRAME_H / 2);
  return dst;
}

function flipFrame(srcCanvas) {
  const dst = document.createElement('canvas');
  dst.width = FRAME_W;
  dst.height = FRAME_H;
  const ctx = dst.getContext('2d');
  ctx.translate(FRAME_W, 0);
  ctx.scale(-1, 1);
  ctx.drawImage(srcCanvas, 0, 0);
  return dst;
}

function generateAllFrames() {
  // Direction 2 = right (base)
  const rightFrames = generateRightFrames();

  // Angles for directions 0-4: up, up-right, right, down-right, down
  // Clamped to max ~25° to keep fish looking natural (not fully vertical)
  const MAX_TILT = Math.PI / 7;  // ~25 degrees
  const DIAG_TILT = Math.PI / 12; // ~15 degrees
  const angles = [-MAX_TILT, -DIAG_TILT, 0, DIAG_TILT, MAX_TILT];

  allFrames = {};

  // Directions 0-4: rotate from right-facing base
  for (let dir = 0; dir <= 4; dir++) {
    for (let f = 0; f < ANIM_FRAMES; f++) {
      const rotated = rotateFrame(rightFrames[f], angles[dir]);
      const name = 'fish_blue_' + dir + '-' + String(f).padStart(2, '0');
      allFrames[name] = rotated;
    }
  }

  // Directions 5,6,7: flip of 3,2,1
  const flipSources = [3, 2, 1];
  for (let i = 0; i < 3; i++) {
    const dir = 5 + i;
    const srcDir = flipSources[i];
    for (let f = 0; f < ANIM_FRAMES; f++) {
      const srcName = 'fish_blue_' + srcDir + '-' + String(f).padStart(2, '0');
      const flipped = flipFrame(allFrames[srcName]);
      const name = 'fish_blue_' + dir + '-' + String(f).padStart(2, '0');
      allFrames[name] = flipped;
    }
  }
}

function packAtlas() {
  // Collect all frame names in order: dir 0 frame 0..11, dir 1 frame 0..11, ...
  const frameList = [];
  for (let dir = 0; dir < DIRECTIONS; dir++) {
    for (let f = 0; f < ANIM_FRAMES; f++) {
      frameList.push('fish_blue_' + dir + '-' + String(f).padStart(2, '0'));
    }
  }

  // Row-based packing into ATLAS_W wide atlas with PADDING
  const placements = []; // {name, x, y, w, h}
  let curX = PADDING;
  let curY = PADDING;
  let rowHeight = 0;

  for (const name of frameList) {
    const canvas = allFrames[name];
    const w = canvas.width;
    const h = canvas.height;

    if (curX + w + PADDING > ATLAS_W) {
      // Next row
      curX = PADDING;
      curY += rowHeight + PADDING;
      rowHeight = 0;
    }

    placements.push({ name, x: curX, y: curY, w, h });
    curX += w + PADDING;
    if (h > rowHeight) rowHeight = h;
  }

  const atlasHeight = curY + rowHeight + PADDING;

  // Draw atlas
  const canvas = document.getElementById('atlas-canvas');
  canvas.width = ATLAS_W;
  canvas.height = atlasHeight;
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, ATLAS_W, atlasHeight);

  for (const p of placements) {
    ctx.drawImage(allFrames[p.name], p.x, p.y);
  }

  atlasCanvas = canvas;

  // Generate SPRITE_DATA
  const offsetX = -Math.floor((LOGICAL_W - FRAME_W) / 2);  // -18
  const offsetY = -Math.floor((LOGICAL_H - FRAME_H) / 2);  // -24

  const frames = placements.map(p => {
    return [p.name, p.x, p.y, p.w, p.h, offsetX, offsetY, LOGICAL_W, LOGICAL_H];
  });

  const data = { frames: frames };
  spriteDataJSON = JSON.stringify(data);

  // Show SPRITE_DATA using textContent
  const output = document.getElementById('sprite-data-output');
  output.textContent = 'const SPRITE_DATA = ' + spriteDataJSON + ';';
}

let previewIntervals = [];

function showDirectionPreviews() {
  // Clear previous intervals to prevent stacking on re-generate
  for (const id of previewIntervals) clearInterval(id);
  previewIntervals = [];

  const previewArea = document.getElementById('preview-area');
  while (previewArea.firstChild) {
    previewArea.removeChild(previewArea.firstChild);
  }

  const scale = 3;
  const previewW = FRAME_W * scale;
  const previewH = FRAME_H * scale;

  for (let dir = 0; dir < DIRECTIONS; dir++) {
    const container = document.createElement('div');
    container.className = 'dir-preview';

    const canvas = document.createElement('canvas');
    canvas.width = previewW;
    canvas.height = previewH;
    canvas.style.imageRendering = 'pixelated';
    canvas.style.width = previewW + 'px';
    canvas.style.height = previewH + 'px';
    container.appendChild(canvas);

    const label = document.createElement('div');
    label.className = 'label';
    label.textContent = 'Dir ' + dir + ' (' + DIR_NAMES[dir] + ')';
    container.appendChild(label);

    previewArea.appendChild(container);

    // Animate
    let frame = 0;
    const ctx = canvas.getContext('2d');
    ctx.imageSmoothingEnabled = false;

    previewIntervals.push(setInterval(function() {
      const name = 'fish_blue_' + dir + '-' + String(frame).padStart(2, '0');
      ctx.clearRect(0, 0, previewW, previewH);
      ctx.drawImage(allFrames[name], 0, 0, FRAME_W, FRAME_H, 0, 0, previewW, previewH);
      frame = (frame + 1) % ANIM_FRAMES;
    }, 80));
  }
}

// === Orchestration ===
function generate() {
  const btn = document.getElementById('btn-generate');
  btn.disabled = true;
  setStatus('Generating right-facing frames...');

  // Use setTimeout to allow UI to update
  setTimeout(function() {
    generateAllFrames();
    setStatus('Packing atlas...');

    setTimeout(function() {
      packAtlas();
      setStatus('Creating previews...');

      setTimeout(function() {
        showDirectionPreviews();
        setStatus('Done! Generated ' + (DIRECTIONS * ANIM_FRAMES) + ' frames.');
        document.getElementById('btn-download').disabled = false;
        document.getElementById('btn-copy').disabled = false;
        btn.disabled = false;
      }, 10);
    }, 10);
  }, 10);
}

function downloadPNG() {
  if (!atlasCanvas) return;
  const link = document.createElement('a');
  link.download = 'fish_blue.png';
  link.href = atlasCanvas.toDataURL('image/png');
  link.click();
}

function copySpriteData() {
  if (!spriteDataJSON) return;
  const text = 'const SPRITE_DATA = ' + spriteDataJSON + ';';
  navigator.clipboard.writeText(text).then(function() {
    setStatus('SPRITE_DATA copied to clipboard!');
  }, function() {
    setStatus('Failed to copy to clipboard.');
  });
}

function setStatus(msg) {
  document.getElementById('status').textContent = msg;
}
</script>
</body>
</html>
