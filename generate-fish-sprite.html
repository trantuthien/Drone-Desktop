<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nemo Fish Sprite Generator</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #1a1a2e;
    color: #e0e0e0;
    font-family: 'Courier New', monospace;
    padding: 20px;
  }
  h1 { color: #FF6B35; margin-bottom: 10px; }
  .subtitle { color: #888; margin-bottom: 20px; font-size: 14px; }
  .buttons { display: flex; gap: 10px; margin-bottom: 15px; flex-wrap: wrap; }
  button {
    background: #FF6B35;
    color: #fff;
    border: none;
    padding: 10px 20px;
    font-size: 14px;
    font-family: inherit;
    cursor: pointer;
    border-radius: 4px;
  }
  button:hover { background: #e05a28; }
  button:disabled { background: #555; cursor: not-allowed; }
  #status { color: #aaa; margin-bottom: 15px; font-size: 13px; min-height: 20px; }
  .section-title { color: #FF8C5A; margin: 15px 0 8px; font-size: 15px; }
  #preview-area {
    display: flex; flex-wrap: wrap; gap: 12px;
    margin-bottom: 20px; min-height: 50px;
  }
  .dir-preview {
    background: #0f0f23;
    border: 1px solid #333;
    border-radius: 4px;
    padding: 6px;
    text-align: center;
  }
  .dir-preview .label { font-size: 11px; color: #888; margin-top: 4px; }
  #atlas-container {
    margin-bottom: 20px;
    overflow: auto;
    max-height: 400px;
    background: #0f0f23;
    border: 1px solid #333;
    border-radius: 4px;
    padding: 8px;
  }
  #atlas-canvas { image-rendering: pixelated; }
  #sprite-data-output {
    background: #0f0f23;
    border: 1px solid #333;
    border-radius: 4px;
    padding: 12px;
    font-size: 11px;
    max-height: 300px;
    overflow: auto;
    white-space: pre-wrap;
    word-break: break-all;
  }
</style>
</head>
<body>
<h1>Nemo Fish Sprite Generator</h1>
<p class="subtitle">Generates a clownfish pixel art sprite sheet (8 directions x 12 frames)</p>

<div class="buttons">
  <button id="btn-generate" onclick="generate()">Generate</button>
  <button id="btn-download" onclick="downloadPNG()" disabled>Download PNG</button>
  <button id="btn-copy" onclick="copySpriteData()" disabled>Copy SPRITE_DATA</button>
</div>

<div id="status">Click Generate to create the sprite sheet.</div>

<div class="section-title">Direction Previews</div>
<div id="preview-area"></div>

<div class="section-title">Texture Atlas</div>
<div id="atlas-container">
  <canvas id="atlas-canvas"></canvas>
</div>

<div class="section-title">SPRITE_DATA</div>
<div id="sprite-data-output"></div>

<script>
// === Configuration ===
const FRAME_W = 60;
const FRAME_H = 48;
const LOGICAL_W = 96;
const LOGICAL_H = 96;
const ANIM_FRAMES = 12;
const DIRECTIONS = 8;
const ATLAS_W = 254;
const PADDING = 1;

// Storage
let allFrames = {}; // key: "fish_nemo_D-FF" -> canvas
let spriteDataJSON = '';
let atlasCanvas = null;
const DIR_NAMES = ['Up', 'Up-Right', 'Right', 'Down-Right', 'Down', 'Down-Left', 'Left', 'Up-Left'];

// === Draw one frame of clownfish facing right using Canvas 2D API ===
// Uses bezier curves, ellipses, gradients for smooth anti-aliased rendering
function drawClownfishRight(ctx, tailAngle, finOffset) {
  const cx = 28;  // body center X
  const cy = 24;  // body center Y
  const bodyRx = 15; // body horizontal radius
  const bodyRy = 10;  // body vertical radius

  ctx.save();
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';

  // --- Tail fin (behind body) ---
  // Side-view: animate tail SPREAD (foreshortening) to show horizontal wagging
  // When tail swings toward/away from viewer, it appears narrower/wider
  const tailBaseX = cx - bodyRx + 2;
  const tailTipX = tailBaseX - 12;
  const tailTipY = cy;
  // Spread cycles between narrow (3) and wide (7) — foreshortening effect
  const tailSpread = 5 + Math.sin(tailAngle) * 2;

  var tailGrad = ctx.createLinearGradient(tailBaseX, cy, tailTipX, tailTipY);
  tailGrad.addColorStop(0, '#FF7F45');
  tailGrad.addColorStop(1, '#FF5522');
  ctx.fillStyle = tailGrad;
  ctx.beginPath();
  ctx.moveTo(tailBaseX, cy - 2);
  ctx.quadraticCurveTo(tailBaseX - 6, cy - 1, tailTipX, tailTipY - tailSpread);
  ctx.quadraticCurveTo(tailTipX + 3, tailTipY, tailTipX + 1, tailTipY);
  ctx.quadraticCurveTo(tailTipX + 3, tailTipY, tailTipX, tailTipY + tailSpread);
  ctx.quadraticCurveTo(tailBaseX - 6, cy + 1, tailBaseX, cy + 2);
  ctx.closePath();
  ctx.fill();
  ctx.strokeStyle = '#CC4411';
  ctx.lineWidth = 0.6;
  ctx.stroke();

  // Tail fin rays (subtle lines)
  ctx.strokeStyle = 'rgba(200, 80, 30, 0.4)';
  ctx.lineWidth = 0.4;
  for (let i = -2; i <= 2; i++) {
    ctx.beginPath();
    ctx.moveTo(tailBaseX - 1, cy + i * 1.2);
    ctx.lineTo(tailTipX + 3, tailTipY + i * (tailSpread / 3));
    ctx.stroke();
  }

  // --- Body: smooth ellipse with gradient ---
  var bodyGrad = ctx.createRadialGradient(cx + 3, cy - 2, 2, cx, cy, bodyRx);
  bodyGrad.addColorStop(0, '#FFA060');
  bodyGrad.addColorStop(0.5, '#FF6B35');
  bodyGrad.addColorStop(1, '#E05520');
  ctx.fillStyle = bodyGrad;
  ctx.beginPath();
  ctx.ellipse(cx, cy, bodyRx, bodyRy, 0, 0, Math.PI * 2);
  ctx.fill();

  // Body outline
  ctx.strokeStyle = '#AA3810';
  ctx.lineWidth = 0.8;
  ctx.stroke();

  // --- Dorsal fin (top, static) ---
  ctx.fillStyle = '#FF9055';
  ctx.beginPath();
  ctx.moveTo(cx - 5, cy - bodyRy + 1);
  ctx.quadraticCurveTo(cx - 1, cy - bodyRy - 7, cx + 6, cy - bodyRy + 1);
  ctx.quadraticCurveTo(cx, cy - bodyRy + 2, cx - 5, cy - bodyRy + 1);
  ctx.closePath();
  ctx.fill();
  ctx.strokeStyle = '#CC5522';
  ctx.lineWidth = 0.5;
  ctx.stroke();

  // Dorsal fin rays
  ctx.strokeStyle = 'rgba(180, 60, 20, 0.3)';
  ctx.lineWidth = 0.3;
  for (let i = 0; i < 4; i++) {
    const fx = cx - 3 + i * 2.5;
    ctx.beginPath();
    ctx.moveTo(fx, cy - bodyRy + 1);
    ctx.lineTo(fx + 0.5, cy - bodyRy - 4);
    ctx.stroke();
  }

  // --- White stripes with smooth edges ---
  function drawStripe(sx, stripeRy, width) {
    // Black border left
    ctx.fillStyle = 'rgba(20, 20, 20, 0.7)';
    ctx.beginPath();
    ctx.ellipse(sx - width / 2 - 0.5, cy, 0.8, stripeRy, 0, 0, Math.PI * 2);
    ctx.fill();
    // White stripe
    ctx.fillStyle = '#FFFFFF';
    ctx.beginPath();
    ctx.ellipse(sx, cy, width / 2, stripeRy, 0, 0, Math.PI * 2);
    ctx.fill();
    // Subtle shadow on white
    ctx.fillStyle = 'rgba(200, 200, 200, 0.3)';
    ctx.beginPath();
    ctx.ellipse(sx + 0.3, cy + 1, width / 2 - 0.3, stripeRy - 0.5, 0, 0, Math.PI * 2);
    ctx.fill();
    // Black border right
    ctx.fillStyle = 'rgba(20, 20, 20, 0.7)';
    ctx.beginPath();
    ctx.ellipse(sx + width / 2 + 0.5, cy, 0.8, stripeRy, 0, 0, Math.PI * 2);
    ctx.fill();
  }

  drawStripe(cx + 9, 7, 3);     // Head stripe
  drawStripe(cx, 9, 3);         // Middle stripe
  drawStripe(cx - 9, 6.5, 2.5); // Tail stripe

  // --- Ventral fin (bottom, static) ---
  ctx.fillStyle = '#FF9055';
  ctx.beginPath();
  ctx.moveTo(cx - 2, cy + bodyRy - 1);
  ctx.quadraticCurveTo(cx + 1, cy + bodyRy + 5, cx + 5, cy + bodyRy - 1);
  ctx.closePath();
  ctx.fill();
  ctx.strokeStyle = '#CC5522';
  ctx.lineWidth = 0.5;
  ctx.stroke();

  // --- Pectoral fin (side, gentle rotation only) ---
  const pfx = cx + 5;
  const pfy = cy + 1;
  ctx.save();
  ctx.translate(pfx, pfy);
  ctx.rotate(Math.sin(tailAngle) * 0.1);
  ctx.fillStyle = 'rgba(255, 144, 85, 0.8)';
  ctx.beginPath();
  ctx.moveTo(0, 0);
  ctx.quadraticCurveTo(5, -1, 7, 3);
  ctx.quadraticCurveTo(3, 4, 0, 2);
  ctx.closePath();
  ctx.fill();
  ctx.strokeStyle = '#CC5522';
  ctx.lineWidth = 0.4;
  ctx.stroke();
  ctx.restore();

  // --- Eye ---
  const eyeX = cx + 11;
  const eyeY = cy - 2;

  // Eye white
  ctx.fillStyle = '#FFFFFF';
  ctx.beginPath();
  ctx.ellipse(eyeX, eyeY, 2.5, 2.5, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = '#111';
  ctx.lineWidth = 0.5;
  ctx.stroke();

  // Pupil
  ctx.fillStyle = '#111111';
  ctx.beginPath();
  ctx.ellipse(eyeX + 0.8, eyeY + 0.3, 1.4, 1.5, 0, 0, Math.PI * 2);
  ctx.fill();

  // Eye highlight
  ctx.fillStyle = '#FFFFFF';
  ctx.beginPath();
  ctx.ellipse(eyeX + 0.2, eyeY - 0.8, 0.7, 0.6, -0.3, 0, Math.PI * 2);
  ctx.fill();

  // --- Mouth ---
  ctx.strokeStyle = '#882200';
  ctx.lineWidth = 0.6;
  ctx.beginPath();
  ctx.moveTo(cx + bodyRx - 1, cy + 1);
  ctx.quadraticCurveTo(cx + bodyRx + 0.5, cy + 2, cx + bodyRx - 1.5, cy + 2.5);
  ctx.stroke();

  // --- Belly highlight (subtle shading) ---
  ctx.fillStyle = 'rgba(255, 200, 150, 0.25)';
  ctx.beginPath();
  ctx.ellipse(cx + 2, cy + 3, bodyRx - 5, bodyRy - 4, 0.1, 0, Math.PI * 2);
  ctx.fill();

  ctx.restore();
}

// === Frame generation ===
function generateRightFrames() {
  const frames = [];
  for (let i = 0; i < ANIM_FRAMES; i++) {
    const t = (i / ANIM_FRAMES) * Math.PI * 2;
    const tailAngle = Math.sin(t) * 0.35;
    const finOffset = Math.sin(t + 0.5) * 1.5;

    const canvas = document.createElement('canvas');
    canvas.width = FRAME_W;
    canvas.height = FRAME_H;
    const ctx = canvas.getContext('2d');
    drawClownfishRight(ctx, tailAngle, finOffset);
    frames.push(canvas);
  }
  return frames;
}

function rotateFrame(srcCanvas, angle) {
  const dst = document.createElement('canvas');
  dst.width = FRAME_W;
  dst.height = FRAME_H;
  const ctx = dst.getContext('2d');
  ctx.translate(FRAME_W / 2, FRAME_H / 2);
  ctx.rotate(angle);
  ctx.drawImage(srcCanvas, -FRAME_W / 2, -FRAME_H / 2);
  return dst;
}

function flipFrame(srcCanvas) {
  const dst = document.createElement('canvas');
  dst.width = FRAME_W;
  dst.height = FRAME_H;
  const ctx = dst.getContext('2d');
  ctx.translate(FRAME_W, 0);
  ctx.scale(-1, 1);
  ctx.drawImage(srcCanvas, 0, 0);
  return dst;
}

function generateAllFrames() {
  // Direction 2 = right (base)
  const rightFrames = generateRightFrames();

  allFrames = {};

  // No rotation — fish swims horizontally, all directions use same sprite
  // Directions 0-4: use right-facing frames (no rotation = no Y jitter)
  for (let dir = 0; dir <= 4; dir++) {
    for (let f = 0; f < ANIM_FRAMES; f++) {
      const name = 'fish_nemo_' + dir + '-' + String(f).padStart(2, '0');
      allFrames[name] = rightFrames[f];
    }
  }

  // Directions 5-7: flip for left-facing
  for (let dir = 5; dir <= 7; dir++) {
    for (let f = 0; f < ANIM_FRAMES; f++) {
      const flipped = flipFrame(rightFrames[f]);
      const name = 'fish_nemo_' + dir + '-' + String(f).padStart(2, '0');
      allFrames[name] = flipped;
    }
  }
}

function packAtlas() {
  // Collect all frame names in order: dir 0 frame 0..11, dir 1 frame 0..11, ...
  const frameList = [];
  for (let dir = 0; dir < DIRECTIONS; dir++) {
    for (let f = 0; f < ANIM_FRAMES; f++) {
      frameList.push('fish_nemo_' + dir + '-' + String(f).padStart(2, '0'));
    }
  }

  // Row-based packing into ATLAS_W wide atlas with PADDING
  const placements = []; // {name, x, y, w, h}
  let curX = PADDING;
  let curY = PADDING;
  let rowHeight = 0;

  for (const name of frameList) {
    const canvas = allFrames[name];
    const w = canvas.width;
    const h = canvas.height;

    if (curX + w + PADDING > ATLAS_W) {
      // Next row
      curX = PADDING;
      curY += rowHeight + PADDING;
      rowHeight = 0;
    }

    placements.push({ name, x: curX, y: curY, w, h });
    curX += w + PADDING;
    if (h > rowHeight) rowHeight = h;
  }

  const atlasHeight = curY + rowHeight + PADDING;

  // Draw atlas
  const canvas = document.getElementById('atlas-canvas');
  canvas.width = ATLAS_W;
  canvas.height = atlasHeight;
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, ATLAS_W, atlasHeight);

  for (const p of placements) {
    ctx.drawImage(allFrames[p.name], p.x, p.y);
  }

  atlasCanvas = canvas;

  // Generate SPRITE_DATA
  const offsetX = -Math.floor((LOGICAL_W - FRAME_W) / 2);  // -18
  const offsetY = -Math.floor((LOGICAL_H - FRAME_H) / 2);  // -24

  const frames = placements.map(p => {
    return [p.name, p.x, p.y, p.w, p.h, offsetX, offsetY, LOGICAL_W, LOGICAL_H];
  });

  const data = { frames: frames };
  spriteDataJSON = JSON.stringify(data);

  // Show SPRITE_DATA using textContent
  const output = document.getElementById('sprite-data-output');
  output.textContent = 'const SPRITE_DATA = ' + spriteDataJSON + ';';
}

let previewIntervals = [];

function showDirectionPreviews() {
  // Clear previous intervals to prevent stacking on re-generate
  for (const id of previewIntervals) clearInterval(id);
  previewIntervals = [];

  const previewArea = document.getElementById('preview-area');
  while (previewArea.firstChild) {
    previewArea.removeChild(previewArea.firstChild);
  }

  const scale = 3;
  const previewW = FRAME_W * scale;
  const previewH = FRAME_H * scale;

  for (let dir = 0; dir < DIRECTIONS; dir++) {
    const container = document.createElement('div');
    container.className = 'dir-preview';

    const canvas = document.createElement('canvas');
    canvas.width = previewW;
    canvas.height = previewH;
    canvas.style.imageRendering = 'pixelated';
    canvas.style.width = previewW + 'px';
    canvas.style.height = previewH + 'px';
    container.appendChild(canvas);

    const label = document.createElement('div');
    label.className = 'label';
    label.textContent = 'Dir ' + dir + ' (' + DIR_NAMES[dir] + ')';
    container.appendChild(label);

    previewArea.appendChild(container);

    // Animate
    let frame = 0;
    const ctx = canvas.getContext('2d');
    ctx.imageSmoothingEnabled = false;

    previewIntervals.push(setInterval(function() {
      const name = 'fish_nemo_' + dir + '-' + String(frame).padStart(2, '0');
      ctx.clearRect(0, 0, previewW, previewH);
      ctx.drawImage(allFrames[name], 0, 0, FRAME_W, FRAME_H, 0, 0, previewW, previewH);
      frame = (frame + 1) % ANIM_FRAMES;
    }, 80));
  }
}

// === Orchestration ===
function generate() {
  const btn = document.getElementById('btn-generate');
  btn.disabled = true;
  setStatus('Generating right-facing frames...');

  // Use setTimeout to allow UI to update
  setTimeout(function() {
    generateAllFrames();
    setStatus('Packing atlas...');

    setTimeout(function() {
      packAtlas();
      setStatus('Creating previews...');

      setTimeout(function() {
        showDirectionPreviews();
        setStatus('Done! Generated ' + (DIRECTIONS * ANIM_FRAMES) + ' frames.');
        document.getElementById('btn-download').disabled = false;
        document.getElementById('btn-copy').disabled = false;
        btn.disabled = false;
      }, 10);
    }, 10);
  }, 10);
}

function downloadPNG() {
  if (!atlasCanvas) return;
  const link = document.createElement('a');
  link.download = 'fish_nemo.png';
  link.href = atlasCanvas.toDataURL('image/png');
  link.click();
}

function copySpriteData() {
  if (!spriteDataJSON) return;
  const text = 'const SPRITE_DATA = ' + spriteDataJSON + ';';
  navigator.clipboard.writeText(text).then(function() {
    setStatus('SPRITE_DATA copied to clipboard!');
  }, function() {
    setStatus('Failed to copy to clipboard.');
  });
}

function setStatus(msg) {
  document.getElementById('status').textContent = msg;
}
</script>
</body>
</html>
